<fuzzy-waddle-home-nav routerLink="/" title="Little Muncher" [showBack]="true" />

<div class="d-flex justify-content-center align-items-start overflow-auto h-100">
  <div class="card-container">
    <div class="general-title">Hill to climb on:</div>
    <div class="d-flex flex-column">
      @for (hill of LittleMuncherHills | keyvalue; track hill) {
        <button class="btn btn-outline-primary m-2 p-2" (click)="climbOn(hill.key)">
          {{ getHillName(hill.value) }}
        </button>
      }
      <button routerLink="high-score" class="btn btn-primary m-2 p-2" type="button">High Scores</button>
    </div>
  </div>

  <little-muncher-spectate />
</div>
