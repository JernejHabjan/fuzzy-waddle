<fuzzy-waddle-home-nav routerLink="/fly-squasher" title="Fly Squasher" [showBack]="true" />

<fuzzy-waddle-center-wrapper>
  <div class="options-page">
    <section class="options-header">
      <div>
        <span class="eyebrow">Audio Rig</span>
        <h1>Fly Squasher Options</h1>
        <p>Dial the mix for kitchen ambience, soundtrack, and all the squishy feedback in between.</p>
      </div>
      <button routerLink="/fly-squasher" class="btn btn-outline-primary" type="button">Back to Lobby</button>
    </section>

    <section class="options-card">
      <div class="section-heading">
        <h2>Volume Controls</h2>
        <p>Your settings are stored locally on this device for the next kitchen clean-up run.</p>
      </div>

      <div class="slider-group">
        <label for="masterVolume" class="form-label form-label--volume">
          <span>Master Volume</span>
          <strong>{{ volumeSettings.masterVolume }}</strong>
        </label>
        <input
          type="range"
          [(ngModel)]="volumeSettings.masterVolume"
          (change)="saveToLocalStorage()"
          class="form-range"
          id="masterVolume"
        />
      </div>
      <div class="slider-group">
        <label for="sfxVolume" class="form-label form-label--volume">
          <span>SFX Volume</span>
          <strong>{{ volumeSettings.sfxVolume }}</strong>
        </label>
        <input
          type="range"
          [(ngModel)]="volumeSettings.sfxVolume"
          (change)="saveToLocalStorage()"
          class="form-range"
          id="sfxVolume"
        />
      </div>
      <div class="slider-group">
        <label for="musicVolume" class="form-label form-label--volume">
          <span>Music Volume</span>
          <strong>{{ volumeSettings.musicVolume }}</strong>
        </label>
        <input
          type="range"
          [(ngModel)]="volumeSettings.musicVolume"
          (change)="saveToLocalStorage()"
          class="form-range"
          id="musicVolume"
        />
      </div>
    </section>
  </div>
</fuzzy-waddle-center-wrapper>
