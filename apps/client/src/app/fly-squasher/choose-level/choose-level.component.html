<fuzzy-waddle-home-nav routerLink="/fly-squasher" title="Fly Squasher" [showBack]="true" />

<fuzzy-waddle-center-wrapper>
  <div class="level-page">
    <section class="level-header">
      <div>
        <span class="eyebrow">Stage Select</span>
        <h1>Choose Your Hunt</h1>
        <p>{{ levelCount }} kitchens are ready. Pick the room that matches the kind of score run you want.</p>
      </div>
      <button routerLink="/fly-squasher/high-score" class="btn btn-outline-primary" type="button">View Board</button>
    </section>

    <div class="level-list">
      @for (level of flySquasherLevels | keyvalue; track level.key) {
        <article class="level-list-item">
          <div class="level-copy">
            <span class="level-tag">Kitchen {{ level.value.id }}</span>
            <div class="level-name">{{ level.value.name }}</div>
            <div class="level-description">{{ level.value.description }}</div>
          </div>
          <button class="btn btn-primary" type="button" routerLink="/fly-squasher/play/{{ level.value.id }}">Play</button>
        </article>
      }
    </div>
  </div>
</fuzzy-waddle-center-wrapper>
