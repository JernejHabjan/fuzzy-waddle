<div class="container mt-4 overflow-auto">
  <div class="card-container">
    <h2 class="text-center text-primary mb-3">Score Screen</h2>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <a class="nav-link" [class.active]="activeTab === 'scoreTable'" (click)="changeTab('scoreTable')">Score Table</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" [class.active]="activeTab === 'chart'" (click)="changeTab('chart')">Stats Over Time</a>
      </li>
    </ul>

    @if (activeTab === "scoreTable") {
      <probable-waffle-score-table />
    }
    @if (activeTab === "chart") {
      <probable-waffle-score-through-time />
    }

    <div class="mt-4">
      <button class="btn btn-primary" routerLink="/aota">Leave</button>
    </div>
  </div>
</div>
