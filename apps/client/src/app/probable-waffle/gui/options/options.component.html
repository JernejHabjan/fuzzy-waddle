@if (!fromGame) {
  <fuzzy-waddle-home-nav routerLink="/aota" title="Ashes of the Ancients" [showBack]="true" />
}

<fuzzy-waddle-center-wrapper>
  <div class="card-container aota-card-shell">
    <div class="general-title">Options:</div>

    <div class="card mt-3 p-3">
      <h5 class="mb-3">Volume Controls:</h5>
      <div class="mb-3">
        <label for="masterVolume" class="form-label form-label--volume"
          >Master Volume: {{ optionsService.volumeSettings.masterVolume }}</label
        >
        <input
          type="range"
          [(ngModel)]="optionsService.volumeSettings.masterVolume"
          (change)="saveToLocalStorage('volume')"
          class="form-range"
          id="masterVolume"
        />
      </div>
      <div class="mb-3">
        <label for="sfxVolume" class="form-label form-label--volume"
          >SFX Volume: {{ optionsService.volumeSettings.sfxVolume }}</label
        >
        <input
          type="range"
          [(ngModel)]="optionsService.volumeSettings.sfxVolume"
          (change)="saveToLocalStorage('volume')"
          class="form-range"
          id="sfxVolume"
        />
      </div>
      <div class="mb-3">
        <label for="musicVolume" class="form-label form-label--volume"
          >Music Volume: {{ optionsService.volumeSettings.musicVolume }}</label
        >
        <input
          type="range"
          [(ngModel)]="optionsService.volumeSettings.musicVolume"
          (change)="saveToLocalStorage('volume')"
          class="form-range"
          id="musicVolume"
        />
      </div>
    </div>

    @if (isTauri) {
      <div class="card mt-3 p-3">
        <h5 class="mb-3">Display:</h5>
        <div class="mb-3 form-check form-switch">
          <input
            type="checkbox"
            class="form-check-input"
            id="fullscreenToggle"
            [checked]="isFullscreen()"
            (change)="toggleFullscreen()"
          />
          <label class="form-check-label" for="fullscreenToggle">
            Fullscreen
            <span class="info-icon" title="Toggle between fullscreen and windowed mode. You can also use the title bar button when windowed.">
              <fa-icon [icon]="faInfoCircle" />
            </span>
          </label>
        </div>
      </div>
    }

    <div class="card mt-3 p-3">
      <h5 class="mb-3">Game Controls:</h5>
      @if (!isTauri) {
        <div class="mb-3 form-check">
          <input
            type="checkbox"
            [(ngModel)]="optionsService.gameSettings.lockToScreen"
            (change)="saveToLocalStorage('game')"
            class="form-check-input"
            id="lockToScreen"
          />
          <label class="form-check-label" for="lockToScreen">
            Lock cursor to screen
            <span
              class="info-icon"
              title="Locks cursor to game window. Automatically releases when dialogs open. Cursor position may jump when releasing lock."
              ><fa-icon [icon]="faInfoCircle" />
            </span>
          </label>
        </div>
      }
      <div class="mb-3 form-check">
        <input
          type="checkbox"
          [(ngModel)]="optionsService.gameSettings.enabledMouseCornerMovement"
          (change)="saveToLocalStorage('game')"
          class="form-check-input"
          id="enabledMouseCornerMovement"
        />
        <label class="form-check-label" for="enabledMouseCornerMovement"> Enable mouse corner camera movement </label>
      </div>
      <div class="mb-3 form-check">
        <input
          type="checkbox"
          [(ngModel)]="optionsService.gameSettings.enableSceneLightingEffects"
          (change)="saveToLocalStorage('game')"
          class="form-check-input"
          id="enableSceneLightingEffects"
        />
        <label class="form-check-label" for="enableSceneLightingEffects">
          Enable dynamic lighting and day/night cycle
        </label>
      </div>
      <div class="mb-0">
        <label class="form-label form-label--select" for="homeScreenBackground">Home screen background</label>
        <select
          id="homeScreenBackground"
          class="form-select"
          [(ngModel)]="optionsService.gameSettings.homeScreenBackground"
          (change)="saveToLocalStorage('game')"
        >
          <option value="ashfall">Ashfall</option>
          <option value="constellation">Constellation</option>
        </select>
      </div>
    </div>

    @if (fromGame) {
      <div class="mt-4">
        <button class="btn btn-primary" (click)="backToGame()">{{ "Back to game" }}</button>
      </div>
    }
  </div>
</fuzzy-waddle-center-wrapper>
