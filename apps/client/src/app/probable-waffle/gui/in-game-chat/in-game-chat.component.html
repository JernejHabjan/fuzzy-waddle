<div class="chat-container">
  <div class="chat-header">
    <span class="chat-title">Game Chat</span>
    @if (fromGame) {
      <button class="close-btn" (click)="backToGame()" title="Close chat">&times;</button>
    }
  </div>
  <div class="chat-content">
    <fuzzy-waddle-chat
      [messageListener]="listenToMessages"
      [gameInstanceId]="gameInstanceClientService.currentGameInstanceId"
      (newMessage)="sendMessage($event)"
    />
  </div>
</div>
