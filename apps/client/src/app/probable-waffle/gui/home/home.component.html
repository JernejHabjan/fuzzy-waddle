<div class="home-container aota-page aota-home h-100">
  <probable-waffle-constellation-effect class="constellation-background" />
  <div class="home-content">
    <div class="left-container">
      @if (isLargeScreen) {
        <probable-waffle-banner />
      }
      <probable-waffle-title />
    </div>
    <div class="menu-container">
      <probable-waffle-main-menu-buttons />
    </div>
  </div>
</div>

<fuzzy-waddle-modal #mobileWarningModal [modalConfig]="mobileWarningConfig">
  <div class="mobile-warning-content">
    <p class="mb-3">
      <strong>AOTA (Age of the Ancients)</strong> is designed for desktop play and may not work properly on mobile
      devices.
    </p>
    <p class="mb-0">For the best experience, please play this game on a desktop or laptop computer.</p>
  </div>
</fuzzy-waddle-modal>
